<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List</title>
    <link rel="stylesheet" href="sass/main.scss" />
    <script type="module" defer src="js/index.js"></script>
  </head>
  <body>
    <div class="container">
      <h1 class="main_heading">Todo List</h1>
      <div class="container__input">
        <input type="text" placeholder="Input a task..." class="todo__input" />
        <button class="btn add__btn">Add</button>
      </div>
      <ul class="todo__container">
        <li class="task">
          <span class="task__text">Go to Gym</span>
          <div class="task-btn__container">
            <button class="btn edit__btn">Edit</button>
            <button class="btn delete__btn">Delete</button>
          </div>
        </li>

          <span class="task__text">Go to Gym</span>
          <div class="task-btn__container">
            <button class="btn edit__btn">Edit</button>
            <button class="btn delete__btn">Delete</button>
          </div>
        </li>

          <span class="task__text">Go to Gym</span>
          <div class="task-btn__container">
            <button class="btn edit__btn">Edit</button>
            <button class="btn delete__btn">Delete</button>
          </div>
        </li>
      </ul>
    </div>
  </body>
</html>
